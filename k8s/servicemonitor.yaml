# =============================================================================
# ServiceMonitor and PodMonitor Resources for Prometheus Operator
# Enables automatic metric collection from RAG system services
# =============================================================================

---
# =============================================================================
# ServiceMonitor: Query Service
# High-traffic service - primary monitoring target
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: query-service-monitor
  namespace: cognimend
  labels:
    app: query-service
    release: prometheus
    app.kubernetes.io/name: query
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: cognimend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: query
      app.kubernetes.io/component: api
  namespaceSelector:
    matchNames:
      - cognimend
  endpoints:
    - port: metrics
      path: /metrics/prometheus
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'go_.*'
          action: drop
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service

