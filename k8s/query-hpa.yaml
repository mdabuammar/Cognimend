# =============================================================================
# Horizontal Pod Autoscaler for Query Service
# High-traffic service requiring dynamic scaling
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: query-hpa
  namespace: cognimend
  labels:
    app.kubernetes.io/name: query
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cognimend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: query
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Scale based on Memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

---
# =============================================================================
# Custom Metrics HPA for Query Service
# Scale based on HTTP request rate and latency
# Requires Prometheus Adapter or KEDA
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: query-custom-hpa
  namespace: cognimend
  labels:
    app.kubernetes.io/name: query
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cognimend
  annotations:
    description: "Custom metrics HPA - requires Prometheus Adapter installed"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: query
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # Scale based on HTTP requests per second
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
    
    # Scale based on request latency (p99)
    - type: Pods
      pods:
        metric:
          name: http_request_duration_seconds_p99
        target:
          type: AverageValue
          averageValue: "500m"  # 500ms target latency
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
