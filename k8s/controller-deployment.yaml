# =============================================================================
# Controller Service Deployment and Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: cognimend
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: orchestration
    app.kubernetes.io/part-of: cognimend
    app.kubernetes.io/version: "2.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: controller
      app.kubernetes.io/component: orchestration
  template:
    metadata:
      labels:
        app.kubernetes.io/name: controller
        app.kubernetes.io/component: orchestration
        app.kubernetes.io/part-of: cognimend
        app.kubernetes.io/version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: cognimend-service
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      
      containers:
        - name: controller
          image: cognimend/controller-service:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: cognimend-config
          
          env:
            - name: SERVICE_NAME
              value: "controller"
            - name: SERVICE_PORT
              value: "8005"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognimend-secrets
                  key: POSTGRES_PASSWORD
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cognimend-secrets
                  key: OPENROUTER_API_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognimend-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: cognimend-secrets
                  key: API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cognimend-secrets
                  key: JWT_SECRET
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: tmp
          emptyDir: {}

---
# =============================================================================
# Controller Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: cognimend
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: orchestration
    app.kubernetes.io/part-of: cognimend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8005
      targetPort: 8005
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: orchestration
