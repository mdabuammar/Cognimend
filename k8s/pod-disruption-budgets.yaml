# =============================================================================
# Pod Disruption Budgets for High Availability
# =============================================================================

# Query Service PDB - Ensure high availability for user-facing queries
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: query-pdb
  namespace: cognimend
  labels:
    app.kubernetes.io/name: query
    app.kubernetes.io/component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: query
      app.kubernetes.io/component: api

---
# Upload Service PDB
apiVersion: policy/v1
