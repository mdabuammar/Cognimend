# =============================================================================
# DriftGuard ConfigMaps and Secrets
# =============================================================================

# Production ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: driftguard-config
  namespace: driftguard-prod
  labels:
    app: driftguard
    environment: production
data:
  # Service URLs
  CONTROLLER_URL: "http://driftguard-controller:8005"
  QUERY_SERVICE_URL: "http://driftguard-query:8002"
  UPLOAD_SERVICE_URL: "http://driftguard-upload:8001"
  EVALUATION_SERVICE_URL: "http://driftguard-evaluation:8003"
  DRIFT_DETECTOR_URL: "http://driftguard-drift:8004"
  TELEMETRY_URL: "http://driftguard-telemetry:8006"
  
  # Infrastructure URLs
  QDRANT_URL: "http://qdrant:6333"
  REDIS_URL: "redis://redis:6379"
  JAEGER_AGENT_HOST: "jaeger"
  JAEGER_AGENT_PORT: "6831"
  
  # Application Settings
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  MAX_UPLOAD_SIZE: "52428800"  # 50MB
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  
  # Rate Limiting
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"

---
# Staging ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: driftguard-config
  namespace: driftguard-staging
  labels:
    app: driftguard
    environment: staging
data:
  CONTROLLER_URL: "http://driftguard-controller:8005"
  QUERY_SERVICE_URL: "http://driftguard-query:8002"
  UPLOAD_SERVICE_URL: "http://driftguard-upload:8001"
  EVALUATION_SERVICE_URL: "http://driftguard-evaluation:8003"
  DRIFT_DETECTOR_URL: "http://driftguard-drift:8004"
  TELEMETRY_URL: "http://driftguard-telemetry:8006"
  
  QDRANT_URL: "http://qdrant:6333"
  REDIS_URL: "redis://redis:6379"
  
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "staging"
  MAX_UPLOAD_SIZE: "52428800"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  ENABLE_DEBUG: "false"  # SECURITY: Set to true only in development

---
# Secrets Template (Use External Secrets Operator in production)
# NOTE: These are placeholder values. In production, use:
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - Kubernetes External Secrets

apiVersion: v1
kind: Secret
metadata:
  name: driftguard-secrets
  namespace: driftguard-prod
  labels:
    app: driftguard
  annotations:
    # SECURITY: These are template values - DO NOT deploy without replacing
    # Use External Secrets Operator, Sealed Secrets, or inject via CI/CD
    security.driftguard.io/requires-rotation: "true"
    security.driftguard.io/last-validated: "never"
type: Opaque
stringData:
  # ⚠️ PRODUCTION SECURITY REQUIREMENTS ⚠️
  # 1. NEVER commit real secrets to git
  # 2. Use External Secrets Operator with Vault/AWS Secrets Manager
  # 3. All values below MUST be replaced before deployment
  
  # Database - MUST be replaced
  DATABASE_URL: "${DATABASE_URL:?ERROR-DATABASE_URL_REQUIRED}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?ERROR-PASSWORD_REQUIRED}"
  
  # Redis - MUST be replaced
  REDIS_PASSWORD: "${REDIS_PASSWORD:?ERROR-PASSWORD_REQUIRED}"
  
  # API Keys (inject from external secret manager)
  OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:?ERROR-API_KEY_REQUIRED}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  
  # JWT Secret - Generate with: openssl rand -base64 64
  JWT_SECRET: "${JWT_SECRET:?ERROR-JWT_SECRET_REQUIRED}"
  
  # Encryption Key - Generate with: openssl rand -base64 32
  ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ERROR-ENCRYPTION_KEY_REQUIRED}"

---
