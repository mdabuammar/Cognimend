# =============================================================================
# CDN & Static Asset Configuration
# =============================================================================
# CloudFront/CloudFlare configuration for static assets
# =============================================================================

# Frontend Service with CDN integration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdn-config
  namespace: driftguard-prod
data:
  CDN_URL: "https://cdn.driftguard.io"
  CACHE_CONTROL_STATIC: "public, max-age=31536000, immutable"
  CACHE_CONTROL_HTML: "no-cache, no-store, must-revalidate"
  CACHE_CONTROL_API: "no-store"

---
# Nginx configuration for static file serving with CDN headers
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-frontend-config
  namespace: driftguard-prod
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    
    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time" '
                        'rid="$http_x_request_id"';
        
        access_log /var/log/nginx/access.log main;
        
        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 5;
        gzip_min_length 256;
        gzip_types
            application/atom+xml
            application/javascript
            application/json
            application/ld+json
            application/manifest+json
            application/rss+xml
            application/vnd.geo+json
            application/vnd.ms-fontobject
            application/x-font-ttf
            application/x-web-app-manifest+json
            application/xhtml+xml
            application/xml
            font/opentype
            image/bmp
            image/svg+xml
            image/x-icon
            text/cache-manifest
            text/css
            text/plain
            text/vcard
            text/vnd.rim.location.xloc
            text/vtt
            text/x-component
            text/x-cross-domain-policy
            text/javascript;
        
        # Brotli compression (if available)
        # brotli on;
        # brotli_comp_level 6;
        # brotli_types application/javascript application/json text/css text/plain;
        
        server {
            listen 80;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;
            
            # Security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.driftguard.io wss:; frame-ancestors 'none';" always;
            
            # Health check
            location /health {
                access_log off;
                return 200 'healthy';
                add_header Content-Type text/plain;
            }
            
            # Static assets with long cache
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
                add_header X-Content-Type-Options "nosniff" always;
                
                # CORS for fonts
                if ($request_filename ~* \.(woff|woff2|ttf|eot)$) {
                    add_header Access-Control-Allow-Origin "*";
                }
            }
            
            # Service worker
            location /sw.js {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
            
            # Manifest
            location /manifest.json {
                add_header Cache-Control "no-cache";
            }
            
            # HTML files - no cache
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
            
            # SPA fallback
            location / {
                try_files $uri $uri/ /index.html;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
            
            # API proxy
            location /api/ {
                proxy_pass http://driftguard-controller:8005/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_read_timeout 300;
                proxy_connect_timeout 10;
                
                # No caching for API
                add_header Cache-Control "no-store";
            }
            
            # Error pages
            error_page 404 /index.html;
            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
    }

---
# CloudFront configuration (AWS CDK/Terraform reference)
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudfront-config
  namespace: driftguard-prod
data:
  cloudfront.tf: |
    # CloudFront Distribution for DriftGuard
    resource "aws_cloudfront_distribution" "driftguard" {
      enabled             = true
      is_ipv6_enabled     = true
      comment             = "DriftGuard CDN"
      default_root_object = "index.html"
      aliases             = ["app.driftguard.io"]
      
      origin {
        domain_name = aws_lb.frontend.dns_name
        origin_id   = "frontend"
        
        custom_origin_config {
          http_port              = 80
          https_port             = 443
          origin_protocol_policy = "https-only"
          origin_ssl_protocols   = ["TLSv1.2"]
        }
        
        custom_header {
          name  = "X-Origin-Verify"
          value = var.origin_secret
        }
      }
      
      origin {
        domain_name = aws_lb.api.dns_name
        origin_id   = "api"
        
        custom_origin_config {
          http_port              = 80
          https_port             = 443
          origin_protocol_policy = "https-only"
          origin_ssl_protocols   = ["TLSv1.2"]
        }
      }
      
      default_cache_behavior {
        allowed_methods  = ["GET", "HEAD", "OPTIONS"]
        cached_methods   = ["GET", "HEAD"]
        target_origin_id = "frontend"
        
        forwarded_values {
          query_string = false
          cookies {
            forward = "none"
          }
        }
        
        viewer_protocol_policy = "redirect-to-https"
        min_ttl                = 0
        default_ttl            = 86400
        max_ttl                = 31536000
        compress               = true
        
        response_headers_policy_id = aws_cloudfront_response_headers_policy.security.id
      }
      
      # API - no caching
      ordered_cache_behavior {
        path_pattern     = "/api/*"
        allowed_methods  = ["DELETE", "GET", "HEAD", "OPTIONS", "PATCH", "POST", "PUT"]
        cached_methods   = ["GET", "HEAD"]
        target_origin_id = "api"
        
        forwarded_values {
          query_string = true
          headers      = ["Authorization", "X-API-Key", "Content-Type"]
          cookies {
            forward = "all"
          }
        }
        
        viewer_protocol_policy = "https-only"
        min_ttl                = 0
        default_ttl            = 0
        max_ttl                = 0
        compress               = true
      }
      
      # Static assets - long cache
      ordered_cache_behavior {
        path_pattern     = "/assets/*"
        allowed_methods  = ["GET", "HEAD"]
        cached_methods   = ["GET", "HEAD"]
        target_origin_id = "frontend"
        
        forwarded_values {
          query_string = false
          cookies {
            forward = "none"
          }
        }
        
        viewer_protocol_policy = "redirect-to-https"
        min_ttl                = 86400
        default_ttl            = 31536000
        max_ttl                = 31536000
        compress               = true
      }
      
      restrictions {
        geo_restriction {
          restriction_type = "none"
        }
      }
      
      viewer_certificate {
        acm_certificate_arn      = aws_acm_certificate.cert.arn
        ssl_support_method       = "sni-only"
        minimum_protocol_version = "TLSv1.2_2021"
      }
      
      tags = {
        Name        = "driftguard-cdn"
        Environment = "production"
      }
    }
    
    # Security headers policy
    resource "aws_cloudfront_response_headers_policy" "security" {
      name    = "driftguard-security-headers"
      comment = "Security headers for DriftGuard"
      
      security_headers_config {
        content_type_options {
          override = true
        }
        
        frame_options {
          frame_option = "DENY"
          override     = true
        }
        
        strict_transport_security {
          access_control_max_age_sec = 31536000
          include_subdomains         = true
          preload                    = true
          override                   = true
        }
        
        xss_protection {
          mode_block = true
          protection = true
          override   = true
        }
        
        content_security_policy {
          content_security_policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.driftguard.io;"
          override                = true
        }
      }
    }
