# pytest.ini
# Pytest configuration for Cognimend RAG System tests

[pytest]
# Minimum pytest version
minversion = 7.0

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require test infrastructure)
    e2e: End-to-end tests (require all services running)
    slow: Slow running tests
    smoke: Smoke tests for quick validation

# Default command line options
addopts = 
    -v
    --strict-markers
    --tb=short
    -ra
    --color=yes

# Timeout for individual tests (seconds)
timeout = 60

# Coverage configuration
[coverage:run]
source = services
branch = True
parallel = True
omit = 
    */tests/*
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
    pass
show_missing = True
fail_under = 30

[coverage:html]
directory = coverage/html

[coverage:xml]
output = coverage/coverage.xml
