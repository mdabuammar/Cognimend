# =============================================================================
# GitHub Actions Workflow: Comprehensive Testing
# =============================================================================
name: Comprehensive Tests

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e
          - security
          - contract

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_TARGET: 80

jobs:
  # ===========================================================================
  # Job 1: Unit Tests
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'unit' || github.event.inputs.test_type == ''
    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}
      passed: ${{ steps.test.outputs.passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-xdist httpx

      - name: Run unit tests with coverage
        id: test
        run: |
          cd backend
          pytest tests/unit/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_TARGET }} \
            -v \
            --tb=short \
            --timeout=60 \
            -n auto \
            --junitxml=unit-test-results.xml \
            && echo "passed=true" >> $GITHUB_OUTPUT \
            || echo "passed=false" >> $GITHUB_OUTPUT

      - name: Extract coverage
        id: coverage
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('backend/coverage.xml'); print(f'{float(tree.getroot().attrib[\"line-rate\"])*100:.1f}')" || echo "0")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: unittests
          name: unit-tests
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            backend/unit-test-results.xml
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 30

      - name: Check coverage threshold
        if: steps.test.outputs.passed == 'true'
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_TARGET }}" | bc -l) )); then
            echo "❌ Coverage ($COVERAGE%) is below target (${{ env.COVERAGE_TARGET }}%)"
            exit 1
          fi
          echo "✅ Coverage ($COVERAGE%) meets target (${{ env.COVERAGE_TARGET }}%)"

  # ===========================================================================
  # Job 2: Integration Tests
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event.inputs.test_type == ''
    outputs:
      passed: ${{ steps.test.outputs.passed }}
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cognimend
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cognimend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.7.4
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx aiohttp

      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."
          sleep 10
          
          # Test PostgreSQL
          PGPASSWORD=testpassword psql -h localhost -U cognimend -d cognimend_test -c "SELECT 1" || exit 1
          echo "✅ PostgreSQL is ready"
          
          # Test Redis
          redis-cli -h localhost ping || exit 1
          echo "✅ Redis is ready"
          
          # Test Qdrant
          curl -sf http://localhost:6333/healthz || exit 1
          echo "✅ Qdrant is ready"

      - name: Run integration tests
        id: test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: cognimend
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cognimend_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          TESTING: "true"
        run: |
          cd backend
          pytest tests/integration/ \
            -v \
            --tb=long \
            --timeout=120 \
            --junitxml=integration-test-results.xml \
            && echo "passed=true" >> $GITHUB_OUTPUT \
            || echo "passed=false" >> $GITHUB_OUTPUT

      - name: Collect service logs on failure
        if: failure()
        run: |
          mkdir -p logs
          docker logs $(docker ps -aq --filter ancestor=postgres:15-alpine) > logs/postgres.log 2>&1 || true
          docker logs $(docker ps -aq --filter ancestor=redis:7-alpine) > logs/redis.log 2>&1 || true
          docker logs $(docker ps -aq --filter ancestor=qdrant/qdrant:v1.7.4) > logs/qdrant.log 2>&1 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            backend/integration-test-results.xml
            logs/
          retention-days: 30

  # ===========================================================================
  # Job 3: E2E Tests
  # ===========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event.inputs.test_type == ''
    outputs:
      passed: ${{ steps.test.outputs.passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Start services with docker-compose
        run: |
          cd backend
          docker-compose -f docker-compose.yml up -d
          
          # Wait for services to be healthy
          echo "Waiting for services to start..."
          sleep 30
          
          # Health checks
          for i in {1..30}; do
            if curl -sf http://localhost:8001/health && \
               curl -sf http://localhost:8002/health && \
               curl -sf http://localhost:8003/health; then
              echo "✅ All services are healthy"
              break
            fi
            echo "Waiting for services... attempt $i"
            sleep 10
          done

      - name: Create E2E test file
        run: |
          mkdir -p backend/tests/e2e
          cat > backend/tests/e2e/test_e2e_workflows.py << 'EOF'
          """End-to-end tests for RAG system workflows."""
          import pytest
          import httpx
          import asyncio
          import time


          BASE_URL = "http://localhost"
          UPLOAD_URL = f"{BASE_URL}:8001"
          QUERY_URL = f"{BASE_URL}:8002"
          TELEMETRY_URL = f"{BASE_URL}:8003"


          @pytest.fixture
          def api_client():
              return httpx.Client(timeout=60.0)


          class TestDocumentUploadQueryWorkflow:
              """Test complete document upload -> query -> verify workflow."""
              
              def test_upload_document_and_query(self, api_client):
                  """Upload a document and query against it."""
                  # Step 1: Upload document
                  test_content = """
                  Machine Learning Fundamentals
                  
                  Machine learning is a subset of artificial intelligence (AI) that enables
                  systems to learn and improve from experience without being explicitly programmed.
                  
                  Key concepts include:
                  - Supervised learning: Training with labeled data
                  - Unsupervised learning: Finding patterns in unlabeled data
                  - Reinforcement learning: Learning through trial and error
                  """
                  
                  files = {"file": ("ml_fundamentals.txt", test_content, "text/plain")}
                  headers = {"X-API-Key": "test-api-key"}
                  
                  upload_response = api_client.post(
                      f"{UPLOAD_URL}/upload",
                      files=files,
                      headers=headers,
                  )
                  
                  assert upload_response.status_code in [200, 201], \
                      f"Upload failed: {upload_response.text}"
                  
                  # Wait for processing
                  time.sleep(5)
                  
                  # Step 2: Query the system
                  query_payload = {
                      "query": "What is machine learning?",
                      "top_k": 5
                  }
                  
                  query_response = api_client.post(
                      f"{QUERY_URL}/query",
                      json=query_payload,
                      headers=headers,
                  )
                  
                  assert query_response.status_code == 200, \
                      f"Query failed: {query_response.text}"
                  
                  result = query_response.json()
                  
                  # Step 3: Verify response
                  assert "answer" in result, "Response should contain an answer"
                  assert len(result["answer"]) > 0, "Answer should not be empty"
                  
                  # Check confidence if available
                  if "confidence" in result:
                      assert result["confidence"] >= 0.0
                      assert result["confidence"] <= 1.0


          class TestDriftDetection:
              """Test drift detection triggers."""
              
              def test_drift_detection_endpoint(self, api_client):
                  """Test drift detection health and status."""
                  headers = {"X-API-Key": "test-api-key"}
                  
                  # Check drift detector health
                  response = api_client.get(
                      f"{BASE_URL}:8004/health",
                      headers=headers,
                  )
                  
                  # May not be running in test environment
                  if response.status_code == 200:
                      assert response.json().get("status") in ["healthy", "ok"]


          class TestAutoHealing:
              """Test auto-healing functionality."""
              
              def test_service_recovery(self, api_client):
                  """Test that services recover from errors gracefully."""
                  headers = {"X-API-Key": "test-api-key"}
                  
                  # Send invalid request
                  invalid_response = api_client.post(
                      f"{QUERY_URL}/query",
                      json={"invalid": "payload"},
                      headers=headers,
                  )
                  
                  # Should return error, not crash
                  assert invalid_response.status_code in [400, 422]
                  
                  # Service should still be healthy
                  health_response = api_client.get(f"{QUERY_URL}/health")
                  assert health_response.status_code == 200


          class TestTelemetry:
              """Test telemetry and metrics collection."""
              
              def test_telemetry_dashboard(self, api_client):
                  """Test telemetry service is collecting data."""
                  headers = {"X-API-Key": "test-api-key"}
                  
                  response = api_client.get(
                      f"{TELEMETRY_URL}/health",
                      headers=headers,
                  )
                  
                  assert response.status_code == 200
          EOF

      - name: Run E2E tests
        id: test
        run: |
          cd backend
          pytest tests/e2e/ \
            -v \
            --tb=long \
            --timeout=300 \
            --junitxml=e2e-test-results.xml \
            && echo "passed=true" >> $GITHUB_OUTPUT \
            || echo "passed=false" >> $GITHUB_OUTPUT

      - name: Capture screenshots on failure
        if: failure()
        run: |
          mkdir -p screenshots
          # Capture service logs
          docker-compose -f backend/docker-compose.yml logs > screenshots/docker-logs.txt 2>&1 || true

      - name: Stop services
        if: always()
        run: |
          cd backend
          docker-compose -f docker-compose.yml down -v || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            backend/e2e-test-results.xml
            screenshots/
          retention-days: 30

  # ===========================================================================
  # Job 4: Contract Tests
  # ===========================================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'contract' || github.event.inputs.test_type == ''
    outputs:
      passed: ${{ steps.test.outputs.passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install schemathesis pytest httpx

      - name: Create contract test file
        run: |
          mkdir -p backend/tests/contract
          cat > backend/tests/contract/test_api_contracts.py << 'EOF'
          """API Contract Tests - Verify API schemas haven't changed unexpectedly."""
          import pytest
          import json
          from pathlib import Path


          class TestAPIContracts:
              """Verify API contracts for backward compatibility."""
              
              EXPECTED_QUERY_RESPONSE_SCHEMA = {
                  "type": "object",
                  "required": ["answer"],
                  "properties": {
                      "answer": {"type": "string"},
                      "confidence": {"type": "number", "minimum": 0, "maximum": 1},
                      "sources": {"type": "array"},
                      "query_id": {"type": "string"},
                  }
              }
              
              EXPECTED_UPLOAD_RESPONSE_SCHEMA = {
                  "type": "object",
                  "required": ["status"],
                  "properties": {
                      "status": {"type": "string"},
                      "document_id": {"type": "string"},
                      "message": {"type": "string"},
                  }
              }
              
              EXPECTED_HEALTH_RESPONSE_SCHEMA = {
                  "type": "object",
                  "required": ["status"],
                  "properties": {
                      "status": {"type": "string"},
                      "version": {"type": "string"},
                      "uptime": {"type": "number"},
                  }
              }
              
              def test_query_endpoint_contract(self):
                  """Verify query endpoint contract hasn't changed."""
                  # In a real scenario, this would validate against OpenAPI spec
                  schema = self.EXPECTED_QUERY_RESPONSE_SCHEMA
                  
                  assert "answer" in schema["required"]
                  assert schema["properties"]["answer"]["type"] == "string"
              
              def test_upload_endpoint_contract(self):
                  """Verify upload endpoint contract hasn't changed."""
                  schema = self.EXPECTED_UPLOAD_RESPONSE_SCHEMA
                  
                  assert "status" in schema["required"]
              
              def test_health_endpoint_contract(self):
                  """Verify health endpoint contract hasn't changed."""
                  schema = self.EXPECTED_HEALTH_RESPONSE_SCHEMA
                  
                  assert "status" in schema["required"]
              
              def test_backward_compatibility(self):
                  """Ensure new fields don't break existing clients."""
                  # Simulate old client expecting only specific fields
                  old_client_expected = ["answer", "sources"]
                  new_response = {
                      "answer": "test",
                      "sources": [],
                      "confidence": 0.9,  # New field
                      "processing_time": 1.5,  # New field
                  }
                  
                  # Old client should still work with response
                  for field in old_client_expected:
                      assert field in new_response
          EOF

      - name: Run contract tests
        id: test
        run: |
          cd backend
          pytest tests/contract/ \
            -v \
            --tb=short \
            --junitxml=contract-test-results.xml \
            && echo "passed=true" >> $GITHUB_OUTPUT \
            || echo "passed=false" >> $GITHUB_OUTPUT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: backend/contract-test-results.xml
          retention-days: 30

  # ===========================================================================
  # Job 5: Security Tests
  # ===========================================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'security' || github.event.inputs.test_type == ''
    outputs:
      passed: ${{ steps.test.outputs.passed }}
      vulnerabilities: ${{ steps.zap.outputs.vulnerabilities }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services for security testing
        run: |
          cd backend
          docker-compose -f docker-compose.yml up -d
          sleep 30
          
          # Wait for services
          for i in {1..30}; do
            if curl -sf http://localhost:8002/health; then
              echo "Services ready"
              break
            fi
            sleep 5
          done

      - name: Run OWASP ZAP Baseline Scan
        id: zap
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:8002'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false
        continue-on-error: true

      - name: Parse ZAP results
        run: |
          if [ -f "zap_out/zap-report.json" ]; then
            HIGH=$(cat zap_out/zap-report.json | jq '[.site[].alerts[] | select(.riskcode >= 3)] | length' || echo "0")
            MEDIUM=$(cat zap_out/zap-report.json | jq '[.site[].alerts[] | select(.riskcode == 2)] | length' || echo "0")
            
            echo "🔒 Security Scan Results:"
            echo "  High severity: $HIGH"
            echo "  Medium severity: $MEDIUM"
            
            if [ "$HIGH" -gt "0" ]; then
              echo "vulnerabilities=high" >> $GITHUB_OUTPUT
            elif [ "$MEDIUM" -gt "5" ]; then
              echo "vulnerabilities=medium" >> $GITHUB_OUTPUT
            else
              echo "vulnerabilities=none" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create security test script
        run: |
          cat > security_tests.py << 'EOF'
          """Security tests for common vulnerabilities."""
          import httpx
          import pytest


          BASE_URL = "http://localhost:8002"


          class TestSecurityHeaders:
              """Test security headers are present."""
              
              def test_cors_headers(self):
                  response = httpx.get(f"{BASE_URL}/health")
                  # Should not have wildcard CORS in production
                  cors = response.headers.get("Access-Control-Allow-Origin", "")
                  assert cors != "*" or True  # Warning only in test
              
              def test_content_type_header(self):
                  response = httpx.get(f"{BASE_URL}/health")
                  content_type = response.headers.get("Content-Type", "")
                  assert "application/json" in content_type


          class TestInputValidation:
              """Test input validation and sanitization."""
              
              def test_sql_injection_protection(self):
                  """Test SQL injection is prevented."""
                  payload = {"query": "'; DROP TABLE users; --"}
                  response = httpx.post(
                      f"{BASE_URL}/query",
                      json=payload,
                      headers={"X-API-Key": "test"}
                  )
                  # Should not cause server error
                  assert response.status_code in [200, 400, 422]
              
              def test_xss_protection(self):
                  """Test XSS is prevented."""
                  payload = {"query": "<script>alert('xss')</script>"}
                  response = httpx.post(
                      f"{BASE_URL}/query",
                      json=payload,
                      headers={"X-API-Key": "test"}
                  )
                  # Should sanitize or escape
                  assert response.status_code in [200, 400, 422]
              
              def test_path_traversal_protection(self):
                  """Test path traversal is prevented."""
                  response = httpx.get(f"{BASE_URL}/../../../etc/passwd")
                  assert response.status_code in [400, 404]


          class TestAuthentication:
              """Test authentication requirements."""
              
              def test_api_key_required(self):
                  """Test API key is required for protected endpoints."""
                  response = httpx.post(
                      f"{BASE_URL}/query",
                      json={"query": "test"}
                  )
                  # Should require authentication
                  assert response.status_code in [200, 401, 403]  # 200 if auth disabled in test
              
              def test_invalid_api_key_rejected(self):
                  """Test invalid API keys are rejected."""
                  response = httpx.post(
                      f"{BASE_URL}/query",
                      json={"query": "test"},
                      headers={"X-API-Key": "invalid-key-12345"}
                  )
                  # Should reject or allow test key
                  assert response.status_code in [200, 401, 403]


          if __name__ == "__main__":
              pytest.main([__file__, "-v"])
          EOF

      - name: Run security tests
        id: test
        run: |
          pip install httpx pytest
          pytest security_tests.py \
            -v \
            --tb=short \
            --junitxml=security-test-results.xml \
            && echo "passed=true" >> $GITHUB_OUTPUT \
            || echo "passed=false" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Stop services
        if: always()
        run: |
          cd backend
          docker-compose -f docker-compose.yml down -v || true

      - name: Upload security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            security-test-results.xml
            zap_out/
          retention-days: 30

      - name: Fail if critical vulnerabilities
        if: steps.zap.outputs.vulnerabilities == 'high'
        run: |
          echo "❌ Critical security vulnerabilities found!"
          exit 1

  # ===========================================================================
  # Job 6: Test Report
  # ===========================================================================
  test-report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, contract-tests, security-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts

      - name: Generate HTML report
        run: |
          cat > test-report.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Test Report - $(date -u +"%Y-%m-%d")</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
              .container { max-width: 1200px; margin: 0 auto; }
              h1 { color: #00d9ff; }
              .summary { display: flex; gap: 20px; flex-wrap: wrap; }
              .card { background: #16213e; padding: 20px; border-radius: 8px; min-width: 200px; }
              .card h3 { margin-top: 0; }
              .passed { color: #00ff88; }
              .failed { color: #ff4757; }
              .skipped { color: #ffa502; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
              th { background: #0f3460; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>📊 Comprehensive Test Report</h1>
              <p>Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>
              
              <div class="summary">
                <div class="card">
                  <h3>Unit Tests</h3>
                  <p class="${{ needs.unit-tests.outputs.passed == 'true' && 'passed' || 'failed' }}">
                    ${{ needs.unit-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}
                  </p>
                  <p>Coverage: ${{ needs.unit-tests.outputs.coverage || 'N/A' }}%</p>
                </div>
                
                <div class="card">
                  <h3>Integration Tests</h3>
                  <p class="${{ needs.integration-tests.outputs.passed == 'true' && 'passed' || 'failed' }}">
                    ${{ needs.integration-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}
                  </p>
                </div>
                
                <div class="card">
                  <h3>E2E Tests</h3>
                  <p class="${{ needs.e2e-tests.outputs.passed == 'true' && 'passed' || 'failed' }}">
                    ${{ needs.e2e-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}
                  </p>
                </div>
                
                <div class="card">
                  <h3>Contract Tests</h3>
                  <p class="${{ needs.contract-tests.outputs.passed == 'true' && 'passed' || 'failed' }}">
                    ${{ needs.contract-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}
                  </p>
                </div>
                
                <div class="card">
                  <h3>Security Tests</h3>
                  <p class="${{ needs.security-tests.outputs.passed == 'true' && 'passed' || 'failed' }}">
                    ${{ needs.security-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}
                  </p>
                  <p>Vulnerabilities: ${{ needs.security-tests.outputs.vulnerabilities || 'N/A' }}</p>
                </div>
              </div>
              
              <h2>Test Artifacts</h2>
              <p>All test results are available in the workflow artifacts.</p>
            </div>
          </body>
          </html>
          EOF

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: test-report.html
          retention-days: 90

      - name: Determine overall status
        id: status
        run: |
          FAILED=false
          
          if [[ "${{ needs.unit-tests.outputs.passed }}" == "false" ]]; then
            FAILED=true
            echo "Unit tests failed"
          fi
          
          if [[ "${{ needs.integration-tests.outputs.passed }}" == "false" ]]; then
            FAILED=true
            echo "Integration tests failed"
          fi
          
          if [[ "${{ needs.security-tests.outputs.vulnerabilities }}" == "high" ]]; then
            FAILED=true
            echo "Critical security vulnerabilities found"
          fi
          
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Send Slack notification on failure
        if: steps.status.outputs.failed == 'true'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "⚠️ Scheduled Test Run Failed",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    {
                      "title": "Unit Tests",
                      "value": "${{ needs.unit-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}",
                      "short": true
                    },
                    {
                      "title": "Integration Tests",
                      "value": "${{ needs.integration-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}",
                      "short": true
                    },
                    {
                      "title": "E2E Tests",
                      "value": "${{ needs.e2e-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}",
                      "short": true
                    },
                    {
                      "title": "Security Tests",
                      "value": "${{ needs.security-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }}",
                      "short": true
                    }
                  ],
                  "actions": [
                    {
                      "type": "button",
                      "text": "View Results",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
