# =============================================================================
# Vertical Pod Autoscaler Configuration
# =============================================================================
# VPA automatically adjusts resource requests based on actual usage
# =============================================================================

# VPA for Controller Service
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: driftguard-controller-vpa
  namespace: driftguard-prod
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: driftguard-controller
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: controller
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: 4000m
          memory: 8Gi
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits

---
# VPA for Query Service
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
