# Prometheus configuration for monitoring RAG system

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Application services
  - job_name: 'upload-service'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: '/metrics'

  - job_name: 'query-service'
    static_configs:
      - targets: ['localhost:8002']
    metrics_path: '/metrics'

  - job_name: 'telemetry-service'
    static_configs:
      - targets: ['localhost:8003']
    metrics_path: '/metrics'

  - job_name: 'drift-detector'
    static_configs:
      - targets: ['localhost:8004']
    metrics_path: '/metrics'

  - job_name: 'controller-service'
    static_configs:
      - targets: ['localhost:8005']
    metrics_path: '/metrics'

  - job_name: 'evaluation-service'
    static_configs:
      - targets: ['localhost:8006']
    metrics_path: '/metrics'

  # Infrastructure
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['localhost:15672']
