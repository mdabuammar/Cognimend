  api-gateway:
    build:
      context: ./backend/services/gateway
      dockerfile: Dockerfile
    env_file: .env
    ports:
    - 8080:8080
    depends_on:
    - auth-service
    - upload-service
    - query-service
    - telemetry-service
    - drift-detector
    - controller-service
    - evaluation-service
#    - super-admin
#    - workspace-admin
    restart: always
    logging: *id001
    networks:
    - cognimend-network
    environment:
    - POSTGRES_HOST=postgres
    - QDRANT_HOST=qdrant
    - REDIS_HOST=redis
    - RABBITMQ_HOST=rabbitmq
    - AUTH_SERVICE_URL=http://auth-service:8000
    - UPLOAD_SERVICE_URL=http://upload-service:8001
    - QUERY_SERVICE_URL=http://query-service:8002
    - TELEMETRY_SERVICE_URL=http://telemetry-service:8003
    - DRIFT_DETECTOR_URL=http://drift-detector:8004
    - CONTROLLER_URL=http://controller-service:8005
    - EVALUATION_URL=http://evaluation-service:8006
#    - SUPER_ADMIN_URL=http://super-admin:8008
#    - WORKSPACE_ADMIN_URL=http://workspace-admin:8009
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
    - VITE_API_URL=https://api.yourdomain.com
    ports:
    - 80:80
    restart: always
    logging: *id001
    networks:
    - cognimend-network
  prometheus:
    image: prom/prometheus:latest
    volumes:
    - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    - ./infrastructure/docker/alerts.yml:/etc/prometheus/rules/alerts.yml
    - prometheus_data:/prometheus
    ports:
    - 9090:9090
    restart: always
    networks:
    - cognimend-network
  grafana:
    image: grafana/grafana:latest
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=
    ports:
    - 3000:3000
    volumes:
    - grafana_data:/var/lib/grafana
    restart: always
    networks:
    - cognimend-network
networks:
  cognimend-network:
    driver: bridge
volumes:
  postgres_data: null
  redis_data: null
  qdrant_data: null
  rabbitmq_data: null
  prometheus_data: null
  grafana_data: null
