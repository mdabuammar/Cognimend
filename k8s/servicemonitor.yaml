---
# =============================================================================
# PodMonitor: All Application Pods
# Collects pod-level metrics from all services in namespace
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cognimend-pod-monitor
  namespace: cognimend
  labels:
    app: cognimend
    release: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: cognimend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: cognimend
  namespaceSelector:
    matchNames:
      - cognimend
  podMetricsEndpoints:
    - port: metrics
      path: /metrics/prometheus
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          targetLabel: component
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node

---
# =============================================================================
# PodMonitor: Database Pods
# Collects metrics from PostgreSQL, Qdrant, Redis
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: database-pod-monitor
  namespace: cognimend
  labels:
    app: cognimend-databases
    release: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: cognimend
spec:
  selector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - database
          - cache
  namespaceSelector:
    matchNames:
      - cognimend
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: database
