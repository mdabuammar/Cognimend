# =============================================================================
# External Secrets Operator Configuration
# =============================================================================
# This configures External Secrets Operator to sync secrets from:
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - Google Secret Manager
# =============================================================================

# SecretStore for HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.driftguard.io:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "driftguard-app"
          serviceAccountRef:
            name: "vault-auth"
            namespace: "driftguard-prod"

---
# SecretStore for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# Production External Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: driftguard-secrets
  namespace: driftguard-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: driftguard-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: driftguard
          environment: production
        annotations:
          reloader.stakater.com/match: "true"
  data:
    # Database credentials
    - secretKey: DATABASE_URL
      remoteRef:
        key: driftguard/production/database
        property: connection_string
    
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: driftguard/production/database
        property: password
    
    # Redis credentials
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: driftguard/production/redis
        property: password
    
    # API Keys
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: driftguard/production/api-keys
        property: openrouter
    
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: driftguard/production/api-keys
        property: openai
    
    # Security secrets
    - secretKey: JWT_SECRET
      remoteRef:
        key: driftguard/production/security
        property: jwt_secret
    
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: driftguard/production/security
        property: encryption_key
    
    - secretKey: API_SECRET_KEY
      remoteRef:
        key: driftguard/production/security
        property: api_secret

---
# Staging External Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: driftguard-secrets
  namespace: driftguard-staging
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: driftguard-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: driftguard/staging/database
        property: connection_string
    
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: driftguard/staging/database
        property: password
    
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: driftguard/staging/redis
        property: password
    
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: driftguard/staging/api-keys
        property: openrouter
    
    - secretKey: JWT_SECRET
      remoteRef:
        key: driftguard/staging/security
        property: jwt_secret

---
# AWS Secrets Manager Alternative
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: driftguard-secrets-aws
  namespace: driftguard-prod
  annotations:
    description: "Alternative configuration for AWS Secrets Manager"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: driftguard-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/driftguard/app-secrets

---
# Secret rotation policy
apiVersion: external-secrets.io/v1beta1
kind: PushSecret
metadata:
  name: driftguard-secret-rotation
  namespace: driftguard-prod
spec:
  refreshInterval: 24h
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: driftguard-secrets
  data:
    - match:
        secretKey: JWT_SECRET
        remoteRef:
          remoteKey: driftguard/production/security
          property: jwt_secret

---
# Sealed Secrets for GitOps (alternative to External Secrets)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: driftguard-sealed-secrets
  namespace: driftguard-prod
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # These values are encrypted with the cluster's sealing key
    # Use kubeseal to generate: kubeseal --format yaml < secret.yaml
    DATABASE_URL: AgBxxx... # Encrypted value
    JWT_SECRET: AgByyy...    # Encrypted value
  template:
    metadata:
      name: driftguard-secrets
      namespace: driftguard-prod
    type: Opaque
