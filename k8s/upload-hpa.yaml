# =============================================================================
# Horizontal Pod Autoscaler for Upload Service
# Scales based on document upload traffic
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-hpa
  namespace: cognimend
  labels:
    app.kubernetes.io/name: upload
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cognimend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload
  minReplicas: 2
  maxReplicas: 6
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    
    # Scale based on Memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  
  behavior:
    scaleDown:
      # Wait 5 minutes before scaling down
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      # Scale up quickly on traffic spikes
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
