# Security Audit Workflow
# Runs pip-audit for vulnerability scanning on all Python dependencies

name: Security Audit

on:
  push:
    branches: [main, develop]
    paths:
      - '**/requirements.txt'
      - '**/pyproject.toml'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/requirements.txt'
      - '**/pyproject.toml'
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pip-audit:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend-root
            path: backend
          - name: upload-service
            path: backend/services/upload
          - name: query-service
            path: backend/services/query
          - name: controller-service
            path: backend/services/controller
          - name: evaluation-service
            path: backend/services/evaluation
          - name: drift-detector-service
            path: backend/services/drift_detector
          - name: telemetry-service
            path: backend/services/telemetry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on ${{ matrix.service.name }}
        id: audit
        continue-on-error: true
        run: |
          cd ${{ matrix.service.path }}
          pip-audit -r requirements.txt \
            --format json \
            --output audit-results.json \
            --desc on \
            --progress-spinner off
        
      - name: Parse audit results
        if: always()
        run: |
          cd ${{ matrix.service.path }}
          if [ -f audit-results.json ]; then
            echo "## 🔒 Security Audit: ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
            
            VULN_COUNT=$(jq 'length' audit-results.json)
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "⚠️ **Found $VULN_COUNT vulnerabilities**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Package | Version | Vulnerability | Fix Version |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|---------|---------------|-------------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | "| \(.name) | \(.version) | \(.vulns[0].id) | \(.vulns[0].fix_versions[0] // "N/A") |"' audit-results.json >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.service.name }}
          path: ${{ matrix.service.path }}/audit-results.json
          if-no-files-found: ignore

      - name: Fail on vulnerabilities (main branch only)
        if: github.ref == 'refs/heads/main' && steps.audit.outcome == 'failure'
        run: |
          echo "::error::Security vulnerabilities found in ${{ matrix.service.name }}"
          exit 1

  # Aggregate results and create issue if needed
  report:
    name: Aggregate Report
    needs: pip-audit
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: audit-results

      - name: Generate combined report
        run: |
          echo "# 🔒 Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          TOTAL_VULNS=0
          for dir in audit-results/*/; do
            if [ -f "$dir/audit-results.json" ]; then
              COUNT=$(jq 'length' "$dir/audit-results.json" 2>/dev/null || echo 0)
              TOTAL_VULNS=$((TOTAL_VULNS + COUNT))
            fi
          done
          
          if [ "$TOTAL_VULNS" -gt 0 ]; then
            echo "⚠️ **Total vulnerabilities across all services: $TOTAL_VULNS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All services passed security audit**" >> $GITHUB_STEP_SUMMARY
          fi
