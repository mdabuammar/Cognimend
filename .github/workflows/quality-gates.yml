# =============================================================================
# Quality Gates Workflow
# =============================================================================
# This workflow enforces quality standards before merging PRs.
# Blocks merges if any quality gate fails.

name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  MIN_COVERAGE_FRONTEND: 60
  MIN_COVERAGE_BACKEND: 50

jobs:
  # ===========================================================================
  # Code Quality Gate
  # ===========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install ruff mypy bandit

      # Frontend Quality Checks
      - name: Frontend - ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: false

      - name: Frontend - TypeScript Check
        working-directory: frontend
        run: npm run typecheck
        continue-on-error: false

      # Backend Quality Checks
      - name: Backend - Ruff Linting
        working-directory: backend
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Backend - Type Checking
        working-directory: backend
        run: mypy services --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  # ===========================================================================
  # Test Coverage Gate
  # ===========================================================================
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    
    outputs:
      frontend-coverage: ${{ steps.frontend-cov.outputs.coverage }}
      backend-coverage: ${{ steps.backend-cov.outputs.coverage }}
      gate-passed: ${{ steps.gate-check.outputs.passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      # Run Frontend Tests with Coverage
      - name: Frontend Tests with Coverage
        id: frontend-cov
        working-directory: frontend
        run: |
          npm run test:coverage -- --reporter=json --outputFile=coverage/test-results.json 2>/dev/null || true
          
          # Extract coverage (fallback to 0 if not available)
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct // 0')
          else
            COVERAGE=0
          fi
          
          echo "Frontend Coverage: $COVERAGE%"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      # Run Backend Tests with Coverage
      - name: Backend Tests with Coverage
        id: backend-cov
        working-directory: backend
        run: |
          python -m pytest services/tests -v --cov=services --cov-report=json --cov-report=term 2>/dev/null || true
          
          # Extract coverage
          if [ -f coverage.json ]; then
            COVERAGE=$(python -c "import json; data=json.load(open('coverage.json')); print(round(data.get('totals', {}).get('percent_covered', 0), 2))")
          else
            COVERAGE=0
          fi
          
          echo "Backend Coverage: $COVERAGE%"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      # Coverage Gate Check
      - name: Check Coverage Gates
        id: gate-check
        run: |
          FRONTEND_COV=${{ steps.frontend-cov.outputs.coverage }}
          BACKEND_COV=${{ steps.backend-cov.outputs.coverage }}
          PASSED=true
          
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Coverage | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Frontend check
          if (( $(echo "$FRONTEND_COV < ${{ env.MIN_COVERAGE_FRONTEND }}" | bc -l) )); then
            echo "| Frontend | ${FRONTEND_COV}% | ${{ env.MIN_COVERAGE_FRONTEND }}% | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
            PASSED=false
          else
            echo "| Frontend | ${FRONTEND_COV}% | ${{ env.MIN_COVERAGE_FRONTEND }}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Backend check
          if (( $(echo "$BACKEND_COV < ${{ env.MIN_COVERAGE_BACKEND }}" | bc -l) )); then
            echo "| Backend | ${BACKEND_COV}% | ${{ env.MIN_COVERAGE_BACKEND }}% | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
            PASSED=false
          else
            echo "| Backend | ${BACKEND_COV}% | ${{ env.MIN_COVERAGE_BACKEND }}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$PASSED" = "false" ]; then
            echo "### ❌ Coverage gate failed!" >> $GITHUB_STEP_SUMMARY
            echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "### ✅ All coverage gates passed!" >> $GITHUB_STEP_SUMMARY
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info,backend/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ===========================================================================
  # Security Gate
  # ===========================================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # NPM Security Audit
      - name: NPM Security Audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high || echo "::warning::NPM audit found vulnerabilities"
        continue-on-error: true

      # Python Security Audit
      - name: Python Security Audit
        working-directory: backend
        run: |
          pip install pip-audit bandit
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities"
        continue-on-error: true

      # Bandit Security Scan
      - name: Bandit Security Scan
        working-directory: backend
        run: |
          bandit -r services -ll --format json --output bandit-report.json || true
          bandit -r services -ll --format txt || echo "::warning::Bandit found security issues"
        continue-on-error: true

      # Secret Scanning
      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ===========================================================================
  # Build Gate
  # ===========================================================================
  build-gate:
    name: Build Gate
    runs-on: ubuntu-latest
    needs: [code-quality]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm run build
          echo "Build size: $(du -sh dist | cut -f1)"

      - name: Verify Build Artifacts
        working-directory: frontend
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build artifacts not found!"
            exit 1
          fi
          
          # Check for critical files
          if [ ! -f "dist/index.html" ]; then
            echo "::error::index.html not found in build!"
            exit 1
          fi
          
          echo "✅ Build verification passed"

      # Docker Build Test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build - Controller
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/services/controller/Dockerfile.optimized
          push: false
          tags: driftguard/controller:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Build - Query
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/services/query/Dockerfile.optimized
          push: false
          tags: driftguard/query:test

  # ===========================================================================
  # Final Gate Summary
  # ===========================================================================
  gate-summary:
    name: Gate Summary
    runs-on: ubuntu-latest
    needs: [code-quality, coverage-gate, security-gate, build-gate]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚦 Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Code Quality
          if [ "${{ needs.code-quality.result }}" == "success" ]; then
            echo "| Code Quality | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Code Quality | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Coverage
          if [ "${{ needs.coverage-gate.result }}" == "success" ]; then
            echo "| Coverage | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Coverage | ⚠️ Warning |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Security
          if [ "${{ needs.security-gate.result }}" == "success" ]; then
            echo "| Security | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security | ⚠️ Warning |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Build
          if [ "${{ needs.build-gate.result }}" == "success" ]; then
            echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.code-quality.result }}" == "success" ] && \
             [ "${{ needs.build-gate.result }}" == "success" ]; then
            echo "### ✅ Ready to merge" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Not ready to merge - fix failing gates" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if Critical Gates Failed
        if: needs.code-quality.result != 'success' || needs.build-gate.result != 'success'
        run: |
          echo "Critical quality gates failed!"
          exit 1
