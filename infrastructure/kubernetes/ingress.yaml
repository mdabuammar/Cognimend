# Ingress Controller Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: driftguard-ingress
  namespace: driftguard
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - driftguard.example.com
    - api.driftguard.example.com
    secretName: driftguard-tls
  rules:
  - host: driftguard.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: driftguard-frontend
            port:
              number: 80
  - host: api.driftguard.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: driftguard-api
            port:
              number: 8001
---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: driftguard-config
  namespace: driftguard
data:
  api_url: "https://api.driftguard.example.com"
  qdrant_url: "http://qdrant:6333"
  redis_cluster: "true"
  log_level: "INFO"
  enable_metrics: "true"
  metrics_port: "9090"
  max_upload_size_mb: "100"
  query_timeout_seconds: "30"
  cache_ttl_seconds: "300"
---
# Secrets template 
# ⚠️ SECURITY WARNING ⚠️
# This is a TEMPLATE file - DO NOT commit with real values!
# Use External Secrets Operator or envsubst in CI/CD pipeline
apiVersion: v1
kind: Secret
metadata:
  name: driftguard-secrets
  namespace: driftguard
  annotations:
    # Validation markers for CI/CD pipeline
    security.driftguard.io/template: "true"
    security.driftguard.io/requires-substitution: "true"
type: Opaque
stringData:
  # All values MUST be injected from external secret manager
  # Generate secrets with: openssl rand -base64 32
  database_url: "${DATABASE_URL:?ERROR-REQUIRED}"
  redis_url: "${REDIS_URL:-redis://redis-cluster:6379}"
  openrouter_api_key: "${OPENROUTER_API_KEY:?ERROR-REQUIRED}"
  jwt_secret: "${JWT_SECRET:?ERROR-REQUIRED}"
  encryption_key: "${ENCRYPTION_KEY:?ERROR-REQUIRED}"
