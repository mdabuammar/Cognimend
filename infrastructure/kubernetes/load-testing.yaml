# =============================================================================
# Load Testing Infrastructure
# =============================================================================
# Kubernetes job for running K6 load tests in CI/CD
# =============================================================================

# K6 Load Test Job
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: driftguard-staging
  labels:
    app: driftguard
    component: load-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: driftguard
        component: load-test
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command:
            - k6
            - run
            - --out
            - influxdb=http://influxdb:8086/k6
            - --tag
            - testid=$(date +%Y%m%d_%H%M%S)
            - /scripts/load-test.js
          env:
            - name: BASE_URL
              value: "http://driftguard-controller:8005"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: driftguard-secrets
                  key: API_SECRET_KEY
            - name: K6_OUT
              value: "influxdb=http://influxdb:8086/k6"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      restartPolicy: Never
      volumes:
        - name: scripts
          configMap:
            name: k6-scripts

---
# ConfigMap for K6 scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: driftguard-staging
data:
  load-test.js: |
    // Embedded K6 script for CI/CD
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate, Trend } from 'k6/metrics';
    
    const errorRate = new Rate('errors');
    const queryLatency = new Trend('query_latency', true);
    
    const BASE_URL = __ENV.BASE_URL || 'http://driftguard-controller:8005';
    const API_KEY = __ENV.API_KEY || 'test-api-key';
    
    export const options = {
      stages: [
        { duration: '1m', target: 10 },
        { duration: '3m', target: 50 },
        { duration: '1m', target: 100 },
        { duration: '5m', target: 100 },
        { duration: '1m', target: 0 },
      ],
      thresholds: {
        errors: ['rate<0.01'],
        query_latency: ['p(95)<500'],
        http_req_duration: ['p(95)<500'],
        http_req_failed: ['rate<0.01'],
      },
    };
    
    export default function() {
      // Health check
      const healthRes = http.get(`${BASE_URL}/health`);
      check(healthRes, { 'health ok': (r) => r.status === 200 });
      
      // Query test
      const payload = JSON.stringify({
        question: "What is the company policy?",
        top_k: 5,
      });
      
      const res = http.post(`${BASE_URL}/query`, payload, {
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': API_KEY,
        },
      });
      
      const success = check(res, {
        'query ok': (r) => r.status === 200,
        'has answer': (r) => JSON.parse(r.body).answer !== undefined,
      });
      
      errorRate.add(!success);
      queryLatency.add(res.timings.duration);
      
      sleep(1);
    }

---
# InfluxDB for K6 results storage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: driftguard-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:1.8
          ports:
            - containerPort: 8086
          env:
            - name: INFLUXDB_DB
              value: k6
            - name: INFLUXDB_HTTP_AUTH_ENABLED
              value: "false"
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: influxdb-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: driftguard-staging
spec:
  ports:
    - port: 8086
      targetPort: 8086
  selector:
    app: influxdb

---
# CronJob for regular load testing
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-scheduled-load-test
  namespace: driftguard-staging
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: k6
              image: grafana/k6:latest
              command:
                - k6
                - run
                - --out
                - influxdb=http://influxdb:8086/k6
                - /scripts/load-test.js
              env:
                - name: BASE_URL
                  value: "http://driftguard-controller:8005"
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: driftguard-secrets
                      key: API_SECRET_KEY
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: 2000m
                  memory: 2Gi
          restartPolicy: Never
          volumes:
            - name: scripts
              configMap:
                name: k6-scripts

---
# Prometheus ServiceMonitor for load test metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k6-metrics
  namespace: driftguard-staging
spec:
  selector:
    matchLabels:
      app: influxdb
  endpoints:
    - port: metrics
      interval: 30s
