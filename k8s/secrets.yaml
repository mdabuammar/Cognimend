# =============================================================================
# Secrets - Sensitive Configuration
# =============================================================================
# âš ï¸ SECURITY WARNING âš ï¸
# This is a TEMPLATE file. DO NOT commit with real values!
# Use one of these methods in production:
# 1. External Secrets Operator with Vault/AWS Secrets Manager
# 2. Sealed Secrets
# 3. envsubst in CI/CD pipeline
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cognimend-secrets
  namespace: cognimend
  labels:
    app.kubernetes.io/name: cognimend
    app.kubernetes.io/component: secrets
  annotations:
    # Validation markers for CI/CD
    security.cognimend.io/template: "true"
    security.cognimend.io/requires-substitution: "true"
type: Opaque
stringData:
  # =============================================================================
  # Database Credentials
  # Generate with: openssl rand -base64 24
  # =============================================================================
  POSTGRES_PASSWORD: <your-db-password>
  
  # =============================================================================
  # Redis Password (optional, but recommended)
  # Generate with: openssl rand -base64 24
  # =============================================================================
  REDIS_PASSWORD: <your-redis-password>
  
  # =============================================================================
  # API Keys
  # =============================================================================
  # OpenRouter API Key (required for LLM calls)
  OPENROUTER_API_KEY: <your-openrouter-api-key>
  
  # Internal API Key for service-to-service auth
  # Generate with: openssl rand -hex 32
  API_KEY: <your-internal-api-key>
  
  # =============================================================================
  # JWT Configuration
  # Generate with: openssl rand -hex 64
  # =============================================================================
  JWT_SECRET: <your-jwt-secret>
  
  # =============================================================================
  # Encryption Key
  # Generate with: openssl rand -base64 32
  # =============================================================================
  ENCRYPTION_KEY: <your-encryption-key>

---
# =============================================================================
# Database URL Secret (constructed from above values)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cognimend-db-url
  namespace: cognimend
  labels:
    app.kubernetes.io/name: cognimend
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql://<user>:<password>@<host>:5432/<database>
  REDIS_URL: redis://:<password>@<host>:6379/0
